[project]
name = "qxall-backend"
version = "0.1.0"
description = "Backend API for the qxall chess application"
requires-python = ">=3.11"
dependencies = [
    "fastapi>=0.115.0",
    "uvicorn[standard]>=0.30.0",
    "python-chess>=1.999",
]

[build-system]
requires = ["setuptools>=68.0"]
build-backend = "setuptools.build_meta"
